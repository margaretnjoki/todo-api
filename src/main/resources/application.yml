spring:
  application:
    name: todo-api

  datasource:
    url: jdbc:postgresql://localhost:5432/todo_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
  servlet:
    context-path: /api/v1

logging:
  level:
    root: INFO
    com.margaretnjoki.todo_api: DEBUG